<!DOCTYPE html>
<html lang="pt-AO" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Minha Conta | Belle Cosméticos</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('bl_theme')||'dark')})()</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="belle.css">
<style>
body{padding-top:56px;padding-bottom:32px;min-height:100vh}
.p-header{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.profile-hero{background:linear-gradient(135deg,rgba(200,164,88,.06),rgba(196,120,136,.04));border-bottom:1px solid var(--border);padding:28px 20px 24px;text-align:center}
.profile-av{width:70px;height:70px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 12px;border:3px solid rgba(200,164,88,.3)}
.profile-name{font-family:var(--ff);font-size:1.3rem;font-weight:700;margin-bottom:3px}
.profile-phone{font-size:.8rem;color:var(--muted)}
.menu-section{padding:16px}
.menu-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px;padding:0 4px}
.menu-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.menu-item{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;transition:background .2s;border-bottom:1px solid var(--border)}
.menu-item:last-child{border-bottom:none}
.menu-item:hover{background:rgba(200,164,88,.04)}
.mi-ico{width:34px;height:34px;border-radius:10px;background:rgba(200,164,88,.08);display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--gold);flex-shrink:0}
.mi-ico.rose{background:rgba(196,120,136,.08);color:var(--rose)}
.mi-ico.sage{background:rgba(122,158,130,.08);color:var(--sage)}
.mi-ico.red{background:rgba(217,80,96,.08);color:var(--red)}
.mi-info{flex:1}
.mi-title{font-size:.86rem;font-weight:600;margin-bottom:1px}
.mi-sub{font-size:.7rem;color:var(--muted)}
.mi-arrow{color:var(--muted);font-size:.78rem}
/* Not logged */
.nl-box{padding:40px 20px;text-align:center}
.nl-ico{font-size:3rem;margin-bottom:16px}
</style>
</head>
<body>
<header class="p-header">
  <button class="nav-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <span style="font-family:var(--ff);font-size:1.05rem;font-weight:700">Minha Conta</span>
  <button class="nav-btn" onclick="Theme.toggle()"><i data-theme-ico class="fa-solid fa-moon"></i></button>
</header>
<div id="page-content"></div>
<div id="bl-toast"></div>
<script src="belle.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  Theme.init();
  // Check next param
  const next = new URLSearchParams(location.search).get('next');
  const sess = Session.get();
  if (sess && next) { location.href = next; return; }
  renderPage(sess);
});

function renderPage(sess) {
  if (sess) {
    document.getElementById('page-content').innerHTML = `
      <div class="profile-hero">
        <div class="profile-av">👸🏿</div>
        <div class="profile-name">${sess.name}</div>
        <div class="profile-phone">${sess.phone||''}${sess.email?' · '+sess.email:''}</div>
      </div>
      <div class="menu-section">
        <div class="menu-label">A minha conta</div>
        <div class="menu-card">
          <div class="menu-item" onclick="location.href='rastrear.html'">
            <div class="mi-ico"><i class="fa-solid fa-magnifying-glass"></i></div>
            <div class="mi-info"><div class="mi-title">Rastrear Encomenda</div><div class="mi-sub">Consulte o estado das suas encomendas</div></div>
            <i class="fa-solid fa-chevron-right mi-arrow"></i>
          </div>
          <div class="menu-item" onclick="editProfile()">
            <div class="mi-ico"><i class="fa-solid fa-user-pen"></i></div>
            <div class="mi-info"><div class="mi-title">Editar Dados</div><div class="mi-sub">Nome, telefone, morada</div></div>
            <i class="fa-solid fa-chevron-right mi-arrow"></i>
          </div>
          <div class="menu-item" onclick="location.href='catalogo.html'">
            <div class="mi-ico rose"><i class="fa-solid fa-heart"></i></div>
            <div class="mi-info"><div class="mi-title">Wishlist</div><div class="mi-sub">${Wishlist.get().length} produto(s) guardado(s)</div></div>
            <i class="fa-solid fa-chevron-right mi-arrow"></i>
          </div>
        </div>
        <div class="menu-label">Loja</div>
        <div class="menu-card">
          <div class="menu-item" onclick="location.href='catalogo.html'">
            <div class="mi-ico sage"><i class="fa-solid fa-bag-shopping"></i></div>
            <div class="mi-info"><div class="mi-title">Catálogo</div><div class="mi-sub">Explorar todos os produtos</div></div>
            <i class="fa-solid fa-chevron-right mi-arrow"></i>
          </div>
          <div class="menu-item" onclick="location.href='sobre.html'">
            <div class="mi-ico sage"><i class="fa-solid fa-circle-info"></i></div>
            <div class="mi-info"><div class="mi-title">Sobre a Belle</div><div class="mi-sub">A nossa história e missão</div></div>
            <i class="fa-solid fa-chevron-right mi-arrow"></i>
          </div>
          <div class="menu-item" onclick="openWhatsApp()">
            <div class="mi-ico sage"><i class="fa-brands fa-whatsapp"></i></div>
            <div class="mi-info"><div class="mi-title">Apoio ao Cliente</div><div class="mi-sub">Fale connosco pelo WhatsApp</div></div>
            <i class="fa-solid fa-chevron-right mi-arrow"></i>
          </div>
        </div>
        <div class="menu-card">
          <div class="menu-item" onclick="logout()">
            <div class="mi-ico red"><i class="fa-solid fa-right-from-bracket"></i></div>
            <div class="mi-info"><div class="mi-title">Terminar Sessão</div><div class="mi-sub">Remover os dados guardados</div></div>
            <i class="fa-solid fa-chevron-right mi-arrow"></i>
          </div>
        </div>
      </div>`;
  } else {
    document.getElementById('page-content').innerHTML = `
      <div class="nl-box">
        <div class="nl-ico">👸🏿</div>
        <div style="font-family:var(--ff);font-size:1.3rem;font-weight:700;margin-bottom:8px">Bem-vinda à Belle</div>
        <p style="font-size:.86rem;color:var(--muted);line-height:1.7;margin-bottom:24px;max-width:280px;margin-left:auto;margin-right:auto">Guarde os seus dados para encomendas mais rápidas e rápidas confirmações.</p>
        <div style="display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto">
          <input class="form-input" id="nl-name" type="text" placeholder="Nome completo">
          <input class="form-input" id="nl-phone" type="tel" placeholder="Telefone (+244...)">
          <input class="form-input" id="nl-email" type="email" placeholder="Email (opcional)">
          <input class="form-input" id="nl-addr" type="text" placeholder="Endereço de entrega">
          <button class="btn-primary w-full" onclick="createSession()">Guardar dados</button>
          <button class="btn-ghost w-full" style="font-size:.82rem" onclick="location.href='index.html'">Continuar sem conta</button>
        </div>
      </div>`;
  }
}

function createSession() {
  const name  = document.getElementById('nl-name')?.value.trim();
  const phone = document.getElementById('nl-phone')?.value.trim();
  if (!name || !phone) { toast('Nome e telefone são obrigatórios', 'err'); return; }
  Session.set({ name, phone, email: document.getElementById('nl-email')?.value.trim()||'', address: document.getElementById('nl-addr')?.value.trim()||'' });
  toast('Dados guardados! ✨', 'ok');
  setTimeout(() => { const next = new URLSearchParams(location.search).get('next'); location.href = next || 'index.html'; }, 1000);
}

function editProfile() {
  const sess = Session.get() || {};
  const body = document.getElementById('page-content');
  body.innerHTML = `
    <div class="menu-section">
      <div style="font-family:var(--ff);font-size:1.2rem;font-weight:700;margin-bottom:16px">Editar perfil</div>
      <input class="form-input mb-12" id="e-name"  type="text" value="${sess.name||''}" placeholder="Nome completo">
      <input class="form-input mb-12" id="e-phone" type="tel"  value="${sess.phone||''}" placeholder="Telefone">
      <input class="form-input mb-12" id="e-email" type="email" value="${sess.email||''}" placeholder="Email">
      <input class="form-input mb-16" id="e-addr"  type="text" value="${sess.address||''}" placeholder="Endereço">
      <button class="btn-primary w-full" onclick="saveEdit()">Guardar alterações</button>
      <button class="btn-ghost w-full mt-8" onclick="location.reload()">Cancelar</button>
    </div>`;
}

function saveEdit() {
  Session.set({ name:document.getElementById('e-name').value.trim(), phone:document.getElementById('e-phone').value.trim(), email:document.getElementById('e-email').value.trim(), address:document.getElementById('e-addr').value.trim() });
  toast('Dados actualizados!', 'ok');
  setTimeout(() => location.reload(), 800);
}

function logout() {
  if (!confirm('Terminar sessão e remover dados guardados?')) return;
  Session.clear();
  toast('Sessão terminada', 'ok');
  setTimeout(() => location.reload(), 800);
}

function openWhatsApp() { window.open(`https://wa.me/${STORE.whatsapp}?text=${encodeURIComponent('Olá Belle Cosméticos! Preciso de ajuda.')}`, '_blank'); }
</script>
</body>
</html>
