<!DOCTYPE html>
<html lang="pt-AO" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Minha Conta | Belle Cosméticos</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('bl_theme')||'dark')})()</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="belle.css">
<style>
body{padding-top:54px;padding-bottom:32px;min-height:100vh}
.p-hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.profile-hero{background:linear-gradient(135deg,rgba(232,96,154,.08),rgba(155,70,212,.05));border-bottom:1px solid var(--border);padding:28px 20px 24px;text-align:center}
.p-av{width:72px;height:72px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1.9rem;margin:0 auto 12px;border:3px solid rgba(232,96,154,.3)}
.p-name{font-family:var(--ff);font-size:1.4rem;margin-bottom:3px}
.p-sub{font-size:.8rem;color:var(--muted)}
.menu-sec{padding:16px}
.menu-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px;padding:0 4px}
.menu-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.mi{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;transition:background .2s;border-bottom:1px solid var(--border)}
.mi:last-child{border-bottom:none}
.mi:hover{background:rgba(232,96,154,.05)}
.mi-ico{width:36px;height:36px;border-radius:10px;background:rgba(232,96,154,.1);display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--pink);flex-shrink:0}
.mi-ico.teal{background:rgba(6,214,160,.1);color:var(--teal)}
.mi-ico.red{background:rgba(255,71,87,.1);color:var(--red)}
.mi-info{flex:1}
.mi-title{font-size:.88rem;font-weight:700;margin-bottom:1px}
.mi-sub{font-size:.7rem;color:var(--muted)}
.mi-arr{color:var(--muted);font-size:.78rem}
/* Register form */
.reg-box{padding:32px 20px;text-align:center}
.reg-ico{font-size:3rem;margin-bottom:14px}
</style>
</head>
<body>
<header class="p-hdr">
  <button class="nav-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <span style="font-family:var(--ff);font-size:1.1rem">Minha Conta</span>
  <button class="nav-btn" onclick="Theme.toggle()"><i data-theme-ico class="fa-solid fa-moon"></i></button>
</header>

<div id="page"></div>
<div id="bl-toast"></div>
<script src="belle.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  Theme.init();
  const next = new URLSearchParams(location.search).get('next');
  const sess = Session.get();
  if (sess && next) { location.href = next; return; }
  renderPage(sess);
});

function renderPage(sess) {
  const wlCount = Wishlist.get().length;
  const s = CMS.store();
  if (sess) {
    document.getElementById('page').innerHTML = `
      <div class="profile-hero">
        <div class="p-av">👸🏿</div>
        <div class="p-name">${sess.name}</div>
        <div class="p-sub">${sess.phone||''}${sess.email?' · '+sess.email:''}</div>
      </div>
      <div class="menu-sec">
        <div class="menu-lbl">A minha conta</div>
        <div class="menu-card">
          <div class="mi" onclick="location.href='rastrear.html'">
            <div class="mi-ico"><i class="fa-solid fa-magnifying-glass"></i></div>
            <div class="mi-info"><div class="mi-title">Rastrear Encomenda</div><div class="mi-sub">Consulte o estado das suas encomendas</div></div>
            <i class="fa-solid fa-chevron-right mi-arr"></i>
          </div>
          <div class="mi" onclick="editProfile()">
            <div class="mi-ico"><i class="fa-solid fa-user-pen"></i></div>
            <div class="mi-info"><div class="mi-title">Editar Dados</div><div class="mi-sub">Nome, telefone, morada</div></div>
            <i class="fa-solid fa-chevron-right mi-arr"></i>
          </div>
          <div class="mi" onclick="location.href='catalogo.html'">
            <div class="mi-ico" style="background:rgba(232,96,154,.1);color:var(--pink)"><i class="fa-solid fa-heart"></i></div>
            <div class="mi-info"><div class="mi-title">Wishlist</div><div class="mi-sub">${wlCount} produto(s) guardado(s)</div></div>
            <i class="fa-solid fa-chevron-right mi-arr"></i>
          </div>
        </div>
        <div class="menu-lbl">Loja</div>
        <div class="menu-card">
          <div class="mi" onclick="location.href='catalogo.html'">
            <div class="mi-ico teal"><i class="fa-solid fa-bag-shopping"></i></div>
            <div class="mi-info"><div class="mi-title">Catálogo</div><div class="mi-sub">Explorar todos os produtos</div></div>
            <i class="fa-solid fa-chevron-right mi-arr"></i>
          </div>
          <div class="mi" onclick="location.href='sobre.html'">
            <div class="mi-ico teal"><i class="fa-solid fa-circle-info"></i></div>
            <div class="mi-info"><div class="mi-title">Sobre a Belle</div><div class="mi-sub">A nossa história e missão</div></div>
            <i class="fa-solid fa-chevron-right mi-arr"></i>
          </div>
          <div class="mi" onclick="window.open('https://wa.me/${s.whatsapp?.replace(/\D/g,'')||''}?text=${encodeURIComponent('Olá! Preciso de ajuda.')}','_blank')">
            <div class="mi-ico teal"><i class="fa-brands fa-whatsapp"></i></div>
            <div class="mi-info"><div class="mi-title">Apoio ao Cliente</div><div class="mi-sub">Fale connosco pelo WhatsApp</div></div>
            <i class="fa-solid fa-chevron-right mi-arr"></i>
          </div>
        </div>
        <div class="menu-card">
          <div class="mi" onclick="doLogout()">
            <div class="mi-ico red"><i class="fa-solid fa-right-from-bracket"></i></div>
            <div class="mi-info"><div class="mi-title">Terminar Sessão</div><div class="mi-sub">Remover os dados guardados</div></div>
            <i class="fa-solid fa-chevron-right mi-arr"></i>
          </div>
        </div>
      </div>`;
  } else {
    document.getElementById('page').innerHTML = `
      <div class="reg-box">
        <div class="reg-ico">👸🏿</div>
        <h1 style="font-family:var(--ff);font-size:1.5rem;margin-bottom:8px">Bem-vinda à Belle</h1>
        <p style="font-size:.86rem;color:var(--muted);line-height:1.7;margin-bottom:24px;max-width:280px;margin-left:auto;margin-right:auto">Guarde os seus dados para encomendas mais rápidas e confirmações imediatas.</p>
        <div style="display:flex;flex-direction:column;gap:10px;max-width:340px;margin:0 auto">
          <input class="form-input" id="nl-name"  type="text"  placeholder="Nome completo">
          <input class="form-input" id="nl-phone" type="tel"   placeholder="Telefone (+244...)">
          <input class="form-input" id="nl-email" type="email" placeholder="Email (opcional)">
          <input class="form-input" id="nl-addr"  type="text"  placeholder="Endereço de entrega (opcional)">
          <button class="btn-primary w-full" onclick="doRegister()"><i class="fa-solid fa-user-check"></i> Guardar dados</button>
          <button class="btn-ghost w-full" style="font-size:.84rem" onclick="location.href='index.html'">Continuar sem conta</button>
        </div>
      </div>`;
  }
}

function doRegister() {
  const name  = document.getElementById('nl-name')?.value.trim();
  const phone = document.getElementById('nl-phone')?.value.trim();
  if (!name || !phone) { toast('Nome e telefone são obrigatórios', 'err'); return; }
  Session.set({ name, phone, email:document.getElementById('nl-email')?.value.trim()||'', address:document.getElementById('nl-addr')?.value.trim()||'' });
  toast('✓ Dados guardados!', 'ok');
  const next = new URLSearchParams(location.search).get('next');
  setTimeout(() => location.href = next || 'index.html', 900);
}

function editProfile() {
  const sess = Session.get() || {};
  document.getElementById('page').innerHTML = `
    <div style="padding:20px 16px">
      <div style="font-family:var(--ff);font-size:1.2rem;margin-bottom:16px">Editar perfil</div>
      <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="e-name"  type="text"  value="${sess.name||''}"></div>
      <div class="form-group"><label class="form-label">Telefone</label><input class="form-input" id="e-phone" type="tel"   value="${sess.phone||''}"></div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="e-email" type="email" value="${sess.email||''}"></div>
      <div class="form-group"><label class="form-label">Endereço</label><input class="form-input" id="e-addr"  type="text"  value="${sess.address||''}"></div>
      <button class="btn-primary w-full mt-8" onclick="saveEdit()"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
      <button class="btn-ghost w-full mt-8" onclick="location.reload()">Cancelar</button>
    </div>`;
}

function saveEdit() {
  Session.set({ name:document.getElementById('e-name').value.trim(), phone:document.getElementById('e-phone').value.trim(), email:document.getElementById('e-email').value.trim(), address:document.getElementById('e-addr').value.trim() });
  toast('✓ Dados actualizados!', 'ok');
  setTimeout(() => location.reload(), 800);
}

function doLogout() {
  if (!confirm('Terminar sessão e apagar dados guardados?')) return;
  Session.clear();
  toast('Sessão terminada', 'ok');
  setTimeout(() => location.reload(), 800);
}
</script>
</body>
</html>
