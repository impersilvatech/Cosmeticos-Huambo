<!DOCTYPE html>
<html lang="pt-AO" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Catálogo | Belle Cosméticos</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('bl_theme')||'dark')})()</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="belle.css">
<style>
body{padding-top:54px;padding-bottom:80px;min-height:100vh}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.hdr-top{display:flex;align-items:center;gap:8px;padding:10px 14px;height:54px}
.search-bar{position:relative;padding:0 14px 10px;border-bottom:1px solid var(--border)}
.s-ico{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.82rem;pointer-events:none}
.s-inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:10px 36px;font-size:.84rem;color:var(--text);outline:none;transition:border-color .2s;font-family:var(--fb)}
.s-inp:focus{border-color:var(--pink)}
.s-inp::placeholder{color:var(--muted)}
.s-clr{position:absolute;right:26px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:.82rem;display:none}
.s-clr.on{display:block}
.cats-bar{overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.cats-bar::-webkit-scrollbar{display:none}
.cats-inner{display:flex;padding:0 12px;width:max-content}
.cat-tab{padding:10px 16px;border:none;background:none;font-family:var(--fb);font-size:.72rem;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:var(--tr)}
.cat-tab.on{color:var(--pink);border-bottom-color:var(--pink)}
.result-row{display:flex;align-items:center;justify-content:space-between;padding:7px 14px 3px}
.result-txt{font-size:.72rem;color:var(--muted)}
.result-txt strong{color:var(--text)}
.sort-btn{font-size:.72rem;color:var(--muted);border:1px solid var(--border);border-radius:50px;padding:5px 12px;cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:5px;background:none}
.sort-btn:hover{border-color:var(--pink);color:var(--pink)}
.vt{width:28px;height:28px;background:none;border:1px solid var(--border);border-radius:8px;font-size:.72rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.vt.on{border-color:var(--pink);color:var(--pink)}
.grid-area{padding:10px 16px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.grid-area.lv{grid-template-columns:1fr}
.grid-area.lv .pcard{display:flex;flex-direction:row}
.grid-area.lv .pcard-img{aspect-ratio:1;width:110px;min-width:110px;border-radius:12px 0 0 12px}
.grid-area.lv .pcard-body{padding-bottom:14px;flex:1}
.grid-area.lv .btn-add-quick{position:static;margin:auto 12px auto 0;flex-shrink:0}
.sort-panel{position:fixed;inset:0;z-index:300;display:none}
.sort-panel.on{display:block}
.sort-scrim{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.sort-box{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:24px 24px 0 0;padding:20px 16px 44px}
.sort-title{font-family:var(--ff);font-size:1.1rem;margin-bottom:16px;text-align:center}
.sort-opt{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;font-size:.88rem}
.sort-opt:last-child{border-bottom:none}
.sort-opt.on{color:var(--pink);font-weight:700}
.sort-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem}
.sort-opt.on .sort-chk{border-color:var(--pink);background:var(--pink);color:#fff}
.wl-banner{display:none;background:rgba(232,96,154,.07);border-bottom:1px solid rgba(232,96,154,.2);padding:7px 16px;font-size:.74rem;color:var(--pink);text-align:center;align-items:center;justify-content:center;gap:8px}
.wl-banner.show{display:flex}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:8px 16px 14px;background:var(--glass);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;gap:10px}
.btn-wl{width:44px;height:44px;flex-shrink:0;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;transition:var(--tr);font-size:.9rem;background:none;position:relative}
.btn-wl.on{border-color:var(--pink);color:var(--pink)}
.wl-cnt{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--pink);color:#fff;font-size:.5rem;font-weight:800;display:none;align-items:center;justify-content:center}
.wl-cnt.on{display:flex}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-top">
    <button class="nav-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
    <div style="font-family:var(--ff);font-size:1.1rem;flex:1;text-align:center" id="hdr-title">Catálogo</div>
    <button class="nav-btn" onclick="Theme.toggle()"><i data-theme-ico class="fa-solid fa-moon"></i></button>
    <a href="carrinho.html" class="nav-btn"><i class="fa-solid fa-bag-shopping"></i><span class="bl-cart-badge">0</span></a>
  </div>
  <div class="search-bar">
    <i class="fa-solid fa-magnifying-glass s-ico"></i>
    <input class="s-inp" id="s-inp" type="text" placeholder="Pesquisar produtos..." oninput="onSearch(this.value)">
    <button class="s-clr" id="s-clr" onclick="clearSearch()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="cats-bar"><div class="cats-inner" id="cats-inner"></div></div>
  <div class="wl-banner" id="wl-banner">
    <i class="fa-solid fa-heart"></i> A mostrar wishlist · <span style="text-decoration:underline;cursor:pointer" onclick="exitWl()">ver todos</span>
  </div>
  <div class="result-row">
    <span class="result-txt" id="result-txt"></span>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="sort-btn" onclick="openSort()"><i class="fa-solid fa-sort"></i> Ordenar</button>
      <div style="display:flex;gap:4px">
        <button class="vt on" id="vt-g" onclick="setView('grid')" title="Grelha"><i class="fa-solid fa-grip"></i></button>
        <button class="vt" id="vt-l" onclick="setView('list')" title="Lista"><i class="fa-solid fa-list"></i></button>
      </div>
    </div>
  </div>
</header>

<div class="grid-area" id="grid"></div>
<div class="empty-state hidden" id="empty">
  <div class="empty-ico">🔍</div>
  <div class="empty-title">Nenhum resultado</div>
  <div class="empty-sub">Tente outros termos ou explore por categoria.</div>
  <button class="btn-ghost" onclick="clearAll()">Ver todos os produtos</button>
</div>

<div class="sort-panel" id="sort-panel">
  <div class="sort-scrim" onclick="closeSort()"></div>
  <div class="sort-box">
    <div class="sort-title">Ordenar por</div>
    <div class="sort-opt on" id="so-0" onclick="setSort(0)"><span>Relevância</span><div class="sort-chk"><i class="fa-solid fa-check"></i></div></div>
    <div class="sort-opt" id="so-1" onclick="setSort(1)"><span>Preço crescente</span><div class="sort-chk"></div></div>
    <div class="sort-opt" id="so-2" onclick="setSort(2)"><span>Preço decrescente</span><div class="sort-chk"></div></div>
    <div class="sort-opt" id="so-3" onclick="setSort(3)"><span>Mais populares</span><div class="sort-chk"></div></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sh-img" id="sh-img"></div>
  <div class="sh-cat" id="sh-cat"></div>
  <div class="sh-name" id="sh-name"></div>
  <div class="sh-price-row"><span class="sh-price" id="sh-price"></span><span class="sh-orig" id="sh-orig" style="display:none"></span><span class="sh-disc" id="sh-disc" style="display:none"></span></div>
  <p class="sh-desc" id="sh-desc"></p>
  <div class="sh-hls" id="sh-hls"></div>
  <div class="qty-row"><span class="qty-lbl">Quantidade</span><div class="qty-ctrl"><button class="qty-btn" onclick="adjQty(-1)">−</button><span class="qty-v" id="qty-v">1</span><button class="qty-btn" onclick="adjQty(1)">+</button></div></div>
  <textarea class="sh-note" id="sh-note" placeholder="Observações (opcional)..."></textarea>
  <button class="btn-primary w-full" id="sh-btn" onclick="addToCart()">Adicionar ao Carrinho</button>
  <button class="btn-ghost w-full mt-8" onclick="goToDetail()" style="padding:12px">Ver detalhes completos</button>
</div>

<div class="bottom-bar">
  <button class="btn-wl relative" id="wl-btn" onclick="toggleWlMode()">
    <i class="fa-solid fa-heart"></i>
    <span class="wl-cnt" id="wl-cnt">0</span>
  </button>
  <a href="carrinho.html" class="btn-primary flex-1" style="justify-content:center;text-decoration:none" id="cart-btn">
    <i class="fa-solid fa-bag-shopping"></i> Carrinho <span id="cart-lbl"></span>
  </a>
</div>
<div id="bl-toast"></div>
<script src="belle.js"></script>
<script>
let _catActive='all',_search='',_sort=0,_wlMode=false,_viewMode='grid';

document.addEventListener('DOMContentLoaded',()=>{
  Theme.init();
  const cf=sessionStorage.getItem('bl_cat_filter');
  if(cf){_catActive=cf;sessionStorage.removeItem('bl_cat_filter');}
  buildTabs(); render(); syncCart(); syncWl();
  window.addEventListener('bl:cart',syncCart);
  window.addEventListener('bl:cms',()=>{buildTabs();render();});
});

function getFiltered(){
  let list=_wlMode?CMS.products().filter(p=>Wishlist.has(p.id)):CMS.products().filter(p=>p.active!==false);
  if(!_wlMode&&_catActive!=='all') list=list.filter(p=>p.cid==_catActive);
  if(_search) list=list.filter(p=>p.name.toLowerCase().includes(_search)||(p.desc||'').toLowerCase().includes(_search));
  if(_sort===1) list.sort((a,b)=>a.price-b.price);
  else if(_sort===2) list.sort((a,b)=>b.price-a.price);
  else if(_sort===3) list.sort((a,b)=>(b.featured?1:0)-(a.featured?1:0));
  return list;
}
function buildTabs(){
  const cats=CMS.categories();
  document.getElementById('cats-inner').innerHTML=
    `<button class="cat-tab ${_catActive==='all'?'on':''}" onclick="setCat('all')">Todos</button>`+
    cats.map(c=>`<button class="cat-tab ${_catActive==c.id?'on':''}" onclick="setCat(${c.id})">${c.emoji} ${c.name}</button>`).join('');
}
function render(){
  const list=getFiltered(),grid=document.getElementById('grid'),empty=document.getElementById('empty');
  document.getElementById('wl-banner').classList.toggle('show',_wlMode);
  if(!list.length){grid.innerHTML='';empty.classList.remove('hidden');document.getElementById('result-txt').innerHTML='<strong>0</strong> produtos';return;}
  empty.classList.add('hidden');
  document.getElementById('result-txt').innerHTML=`<strong>${list.length}</strong> produto${list.length!==1?'s':''}`;
  grid.innerHTML=list.map((p,i)=>buildProdCard(p,i*.04)).join('');
}
function setCat(id){_catActive=id;_search='';document.getElementById('s-inp').value='';document.getElementById('s-clr').classList.remove('on');buildTabs();render();}
const onSearch=debounce(v=>{_search=v.trim().toLowerCase();document.getElementById('s-clr').classList.toggle('on',!!v);_catActive='all';buildTabs();render();});
function clearSearch(){_search='';document.getElementById('s-inp').value='';document.getElementById('s-clr').classList.remove('on');render();}
function clearAll(){_search='';_catActive='all';_wlMode=false;clearSearch();buildTabs();render();syncWl();}
function setSort(i){
  _sort=i;
  for(let j=0;j<4;j++){const el=document.getElementById('so-'+j);el.classList.toggle('on',j===i);el.querySelector('.sort-chk').innerHTML=j===i?'<i class="fa-solid fa-check"></i>':'';}
  closeSort();render();
}
function openSort(){document.getElementById('sort-panel').classList.add('on');}
function closeSort(){document.getElementById('sort-panel').classList.remove('on');}
function setView(v){_viewMode=v;document.getElementById('grid').className='grid-area'+(v==='list'?' lv':'');document.getElementById('vt-g').classList.toggle('on',v==='grid');document.getElementById('vt-l').classList.toggle('on',v==='list');}
function toggleWlMode(){_wlMode=!_wlMode;document.getElementById('wl-btn').classList.toggle('on',_wlMode);render();}
function exitWl(){_wlMode=false;document.getElementById('wl-btn').classList.remove('on');render();}
function syncWl(){const n=Wishlist.get().length;const c=document.getElementById('wl-cnt');c.textContent=n;c.classList.toggle('on',n>0);}
function syncCart(){const n=Cart.count();const lbl=document.getElementById('cart-lbl');lbl.innerHTML=n>0?`<span style="background:rgba(255,255,255,.25);border-radius:50px;padding:1px 8px;font-size:.75rem;margin-left:4px">${n}</span>`:'';}
</script>
</body>
</html>
