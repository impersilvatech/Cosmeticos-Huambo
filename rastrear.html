<!DOCTYPE html>
<html lang="pt-AO" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rastrear Encomenda | Belle Cosméticos</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('bl_theme')||'dark')})()</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="belle.css">
<style>
body{padding-top:54px;padding-bottom:40px;min-height:100vh}
.p-hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.track-hero{padding:36px 20px 28px;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(232,96,154,.06),transparent)}
.track-ico{font-size:3rem;margin-bottom:14px}
.input-row{display:flex;gap:8px}
.input-row .form-input{flex:1;border-radius:12px}
.btn-buscar{padding:12px 18px;background:var(--grad);border:none;border-radius:12px;font-family:var(--ff);font-weight:700;color:#fff;cursor:pointer;font-size:.88rem;transition:var(--tr);white-space:nowrap}
.btn-buscar:hover{filter:brightness(1.1)}
.result{padding:0 16px;margin-top:20px}
.ord-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.oc-ref{font-family:var(--ff);font-size:1.1rem;color:var(--pink);margin-bottom:4px}
.oc-date{font-size:.72rem;color:var(--muted);margin-bottom:12px}
/* Timeline */
.tl{position:relative;padding-left:20px;margin-bottom:18px}
.tl::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-step{display:flex;gap:14px;position:relative;padding-bottom:18px;z-index:1}
.tl-step:last-child{padding-bottom:0}
.tl-step.done .tl-before{background:var(--teal)}
.tl-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:var(--bg);position:absolute;left:-14px;top:2px;z-index:1;transition:var(--tr)}
.tl-step.done .tl-dot{background:var(--teal);border-color:var(--teal)}
.tl-step.active .tl-dot{background:rgba(232,96,154,.2);border-color:var(--pink);box-shadow:0 0 0 4px rgba(232,96,154,.15)}
.tl-lbl{font-size:.84rem;font-weight:700;margin-bottom:2px}
.tl-step.active .tl-lbl{color:var(--pink)}
.tl-step.done .tl-lbl{color:var(--teal)}
.tl-sub{font-size:.7rem;color:var(--muted)}
</style>
</head>
<body>
<header class="p-hdr">
  <button class="nav-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <span style="font-family:var(--ff);font-size:1.1rem">Rastrear Encomenda</span>
  <div style="width:36px"></div>
</header>

<div class="track-hero">
  <div class="track-ico">📦</div>
  <h1 class="sec-title" style="margin-bottom:8px">Onde está a<br><em>minha encomenda?</em></h1>
  <p style="font-size:.84rem;color:var(--muted);line-height:1.65;margin-bottom:20px">Insira a referência da sua encomenda para consultar o estado.</p>
  <div class="form-group" style="text-align:left">
    <label class="form-label">Referência da encomenda</label>
    <div class="input-row">
      <input class="form-input" id="ref-inp" type="text" placeholder="Ex: BL-20240421-1234" oninput="this.value=this.value.toUpperCase()">
      <button class="btn-buscar" onclick="track()"><i class="fa-solid fa-magnifying-glass"></i> Buscar</button>
    </div>
  </div>
</div>

<div class="result" id="result"></div>
<div id="bl-toast"></div>
<script src="belle.js"></script>
<script>
const STATUS_IDX = { pending:0, confirmed:1, shipped:2, delivered:3 };
const STEPS = [
  { label:'Encomenda recebida',  sub:'Pedido registado no sistema' },
  { label:'Confirmada',          sub:'A preparar para envio' },
  { label:'Em entrega',          sub:'A caminho de si' },
  { label:'Entregue',            sub:'Concluída com sucesso' },
];

document.addEventListener('DOMContentLoaded', () => {
  Theme.init();
  const ref = new URLSearchParams(location.search).get('ref');
  if (ref) { document.getElementById('ref-inp').value = ref; track(); }
});

function track() {
  const ref = document.getElementById('ref-inp').value.trim();
  if (!ref) { toast('Insira a referência da encomenda', 'err'); return; }
  const area = document.getElementById('result');
  area.innerHTML = '<div style="padding:24px;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>';
  const order = Orders.track(ref);
  if (!order) {
    area.innerHTML = `<div class="empty-state"><div class="empty-ico">🔍</div><div class="empty-title">Não encontrada</div><div class="empty-sub">Verifique a referência. Formato: BL-YYYYMMDD-XXXX</div></div>`;
    return;
  }
  const st = ORDER_STATUS[order.status] || ORDER_STATUS.pending;
  const pi = STATUS_IDX[order.status] ?? 0;
  const cancelled = order.status === 'cancelled';
  const payLabels = { transferencia:'Transferência Bancária', referencia:'Multicaixa Express', na_entrega:'Pagamento na Entrega' };
  const s = CMS.store();
  area.innerHTML = `
    <div class="ord-card">
      <div class="oc-ref">${order.reference}</div>
      <div class="oc-date">${fmtDate(order.created_at)}</div>
      <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:50px;background:${st.bg};color:${st.color};font-family:var(--ff);font-size:.75rem;margin-bottom:14px">${st.icon} ${st.label}</div>

      ${!cancelled ? `<div class="tl">${STEPS.map((step,i)=>`
        <div class="tl-step ${i<pi?'done':''} ${i===pi?'active':''}">
          <div class="tl-dot"></div>
          <div><div class="tl-lbl">${step.label}</div><div class="tl-sub">${step.sub}</div></div>
        </div>`).join('')}
      </div>` : `<div style="background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);border-radius:10px;padding:12px;font-size:.84rem;color:var(--red);text-align:center;margin-bottom:14px">❌ Esta encomenda foi cancelada</div>`}

      <div style="border-top:1px solid var(--border);padding-top:12px;display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;justify-content:space-between;font-size:.82rem"><span style="color:var(--muted)">Cliente</span><span style="font-weight:700">${order.customer?.name||'—'}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:.82rem"><span style="color:var(--muted)">Pagamento</span><span style="font-weight:700">${payLabels[order.payment_method]||order.payment_method||'—'}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:10px;margin-top:4px">
          <span style="font-family:var(--ff);font-size:.95rem">Total</span>
          <span style="font-family:var(--ff);font-size:1.2rem;color:var(--pink)">${kz(order.total)}</span>
        </div>
      </div>
    </div>
    <button class="btn-ghost w-full" onclick="window.open('https://wa.me/${s.whatsapp?.replace(/\D/g,'')||''}?text=${encodeURIComponent('Olá! Tenho dúvidas sobre a encomenda '+(order.reference||ref))}','_blank')">
      <i class="fa-brands fa-whatsapp"></i> Falar com suporte
    </button>`;
}
</script>
</body>
</html>
