<!DOCTYPE html>
<html lang="pt-AO" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Produto | Belle Cosméticos</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('bl_theme')||'dark')})()</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="belle.css">
<style>
body{padding-top:56px;padding-bottom:88px;min-height:100vh}
.p-header{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.hero-img{width:100%;aspect-ratio:1;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:6rem;position:relative;overflow:hidden;max-height:380px}
.hero-img img{width:100%;height:100%;object-fit:cover}
.p-tag{position:absolute;top:14px;left:14px}
.p-wish{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;background:var(--glass);backdrop-filter:blur(8px);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--muted);transition:var(--tr)}
.p-wish.on,.p-wish:hover{color:var(--rose);border-color:var(--rose)}
.p-body{padding:20px 16px 0}
.p-cat{font-size:.68rem;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.p-name{font-family:var(--ff);font-size:1.7rem;font-weight:700;line-height:1.15;margin-bottom:12px}
.p-price-row{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.p-price{font-family:var(--ff);font-size:1.8rem;font-weight:700;color:var(--gold)}
.p-orig{font-size:.95rem;color:var(--muted);text-decoration:line-through}
.p-disc{font-size:.72rem;background:var(--grad);color:#09080a;padding:3px 10px;border-radius:50px;font-weight:700}
.p-stock{font-size:.73rem;color:var(--sage);margin-bottom:16px}
.p-desc{font-size:.88rem;color:var(--muted);line-height:1.8;margin-bottom:18px}
.p-hls{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.hl-row{display:flex;align-items:flex-start;gap:10px;font-size:.84rem}
.hl-ico{color:var(--gold);font-size:.75rem;margin-top:3px;flex-shrink:0}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin:0 16px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:12px 16px;border:none;background:none;font-family:var(--fb);font-size:.78rem;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:var(--tr)}
.tab-btn.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab-content{padding:16px;display:none}
.tab-content.on{display:block}
/* Related */
.rel-title{font-family:var(--ff);font-size:1.1rem;font-weight:700;margin:0 16px 14px}
.rel-row{overflow-x:auto;scrollbar-width:none;padding:0 16px}
.rel-row::-webkit-scrollbar{display:none}
.rel-inner{display:flex;gap:10px;width:max-content}
.rel-card{width:150px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;flex-shrink:0;transition:var(--tr)}
.rel-card:hover{border-color:rgba(200,164,88,.3);transform:translateY(-2px)}
.rel-img{aspect-ratio:1;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:2.2rem;overflow:hidden;position:relative}
.rel-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.rel-body{padding:8px 10px}
.rel-name{font-size:.75rem;font-weight:600;margin-bottom:3px;line-height:1.3}
.rel-price{font-size:.78rem;color:var(--gold);font-family:var(--ff);font-weight:700}
/* Bottom bar */
.buy-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:10px 16px 16px;background:var(--glass);backdrop-filter:blur(20px);border-top:1px solid var(--border)}
.buy-inner{display:flex;gap:10px;align-items:center}
.qty-pill{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:50px;overflow:hidden}
.qb{width:40px;height:44px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;transition:color .2s}
.qb:hover{color:var(--gold)}
.qv{min-width:32px;text-align:center;font-weight:700}
.btn-buy{flex:1;height:44px;background:var(--grad);border:none;border-radius:50px;font-size:.88rem;font-weight:700;color:#09080a;cursor:pointer;transition:var(--tr);box-shadow:0 6px 20px rgba(200,164,88,.28)}
.btn-buy:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(200,164,88,.38)}
.btn-buy:disabled{opacity:.5;cursor:not-allowed;transform:none}
.esgotado-bar{background:rgba(217,80,96,.08);border:1px solid rgba(217,80,96,.2);border-radius:12px;padding:14px 16px;text-align:center;font-size:.84rem;color:var(--red)}
/* Reviews */
.rev-avg{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.rev-big{font-family:var(--ff);font-size:2.5rem;font-weight:700;color:var(--gold)}
.rev-stars-big{color:var(--gold);font-size:.9rem;margin-bottom:3px}
.rev-count{font-size:.72rem;color:var(--muted)}
.rev-item{padding:14px 0;border-bottom:1px solid var(--border)}
.rev-item:last-child{border-bottom:none}
.rev-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rev-name{font-size:.82rem;font-weight:600}
.rev-date{font-size:.68rem;color:var(--muted)}
.rev-stars{color:var(--gold);font-size:.72rem;margin-bottom:5px}
.rev-txt{font-size:.82rem;color:var(--muted);line-height:1.7}
</style>
</head>
<body>

<header class="p-header">
  <button class="nav-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <span style="font-family:var(--ff);font-size:1rem;font-weight:700">Produto</span>
  <div style="display:flex;gap:4px">
    <button class="nav-btn" onclick="shareProduct()" title="Partilhar"><i class="fa-solid fa-share-nodes"></i></button>
    <a href="carrinho.html" class="nav-btn"><i class="fa-solid fa-bag-shopping"></i><span class="bl-cart-badge">0</span></a>
  </div>
</header>

<div id="page-content">
  <div style="padding:60px 20px;text-align:center"><div class="spinner" style="margin:0 auto"></div></div>
</div>

<div id="bl-toast"></div>
<script src="belle.js"></script>
<script>
let _p = null, _qty = 1, _cats = [];

document.addEventListener('DOMContentLoaded', async () => {
  Theme.init();
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'catalogo.html'; return; }
  _cats = await API.getCategories();
  _p = await API.getProduct(+id);
  if (!_p) { location.href = 'catalogo.html'; return; }
  render();
});

function render() {
  const p = _p;
  const cat = _cats.find(c => c.id === p.cid);
  const disc = p.orig > 0 ? Math.round((1 - p.price / p.orig) * 100) : 0;
  const tagMap = { promo:`−${disc}%`, novo:'Novo', destaque:'Destaque', bestseller:'Best Seller' };
  const wOn = Wishlist.has(p.id);

  document.title = `${p.name} | Belle Cosméticos`;

  document.getElementById('page-content').innerHTML = `
    <div class="hero-img">
      ${p.image ? `<img src="${p.image}" alt="${p.name}" onerror="this.style.display='none'">` : ''}
      <span ${p.image?'style="display:none"':''}>${p.emoji}</span>
      ${p.tag ? `<div class="p-tag"><span class="pcard-tag ${p.tag}">${tagMap[p.tag]||p.tag}</span></div>` : ''}
      <button class="p-wish ${wOn?'on':''}" id="wish-btn" onclick="toggleWish(${p.id},this)">
        <i class="fa-${wOn?'solid':'regular'} fa-heart"></i>
      </button>
    </div>

    <div class="p-body">
      <div class="p-cat">${cat?.name||''}</div>
      <div class="p-name">${p.name}</div>
      <div class="p-price-row">
        <span class="p-price">${kz(p.price)}</span>
        ${p.orig>0?`<span class="p-orig">${kz(p.orig)}</span><span class="p-disc">−${disc}%</span>`:''}
      </div>
      ${p.stock > 0 ? `<div class="p-stock"><i class="fa-solid fa-circle-check" style="margin-right:4px"></i>Em stock · ${p.stock} unidades disponíveis</div>` : `<div class="p-stock" style="color:var(--red)"><i class="fa-solid fa-circle-xmark" style="margin-right:4px"></i>Esgotado</div>`}
    </div>

    <div class="tabs">
      <button class="tab-btn on" onclick="setTab(this,'tab-desc')">Descrição</button>
      <button class="tab-btn" onclick="setTab(this,'tab-hls')">Destaques</button>
      <button class="tab-btn" onclick="setTab(this,'tab-rev')">Avaliações</button>
      <button class="tab-btn" onclick="setTab(this,'tab-delivery')">Entrega</button>
    </div>

    <div class="tab-content on" id="tab-desc">
      <p class="p-desc">${p.desc}</p>
    </div>

    <div class="tab-content" id="tab-hls">
      <div class="p-hls">
        ${(p.hl||[]).map(h => `<div class="hl-row"><span class="hl-ico"><i class="fa-solid fa-check"></i></span><span>${h}</span></div>`).join('')}
      </div>
    </div>

    <div class="tab-content" id="tab-rev">
      <div class="rev-avg">
        <div class="rev-big">4.9</div>
        <div>
          <div class="rev-stars-big">★★★★★</div>
          <div class="rev-count">Baseado em 47 avaliações</div>
        </div>
      </div>
      <div class="rev-item">
        <div class="rev-hdr"><span class="rev-name">Joana M.</span><span class="rev-date">há 3 dias</span></div>
        <div class="rev-stars">★★★★★</div>
        <p class="rev-txt">Produto incrível! Superou todas as expectativas. A qualidade é visível logo na embalagem.</p>
      </div>
      <div class="rev-item">
        <div class="rev-hdr"><span class="rev-name">Sílvia P.</span><span class="rev-date">há 1 semana</span></div>
        <div class="rev-stars">★★★★★</div>
        <p class="rev-txt">Já comprei pela terceira vez. Não fico sem este produto! Entrega rápida e bem embalado.</p>
      </div>
      <div class="rev-item">
        <div class="rev-hdr"><span class="rev-name">Miriam K.</span><span class="rev-date">há 2 semanas</span></div>
        <div class="rev-stars">★★★★☆</div>
        <p class="rev-txt">Muito bom produto. Resultados visíveis após 2 semanas de uso. Recomendo!</p>
      </div>
    </div>

    <div class="tab-content" id="tab-delivery">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="hl-row"><span class="hl-ico">🚚</span><span><strong>Luanda:</strong> 24-48 horas após confirmação</span></div>
        <div class="hl-row"><span class="hl-ico">📦</span><span><strong>País todo:</strong> 3-5 dias úteis via DHL/CTT Angola</span></div>
        <div class="hl-row"><span class="hl-ico">💰</span><span><strong>Entrega grátis</strong> em compras acima de 10.000 Kz</span></div>
        <div class="hl-row"><span class="hl-ico">🔄</span><span><strong>Devolução</strong> gratuita em 30 dias se o produto não satisfizer</span></div>
        <div class="hl-row"><span class="hl-ico">💳</span><span>Pagamento via Transferência, Multicaixa Express ou na entrega</span></div>
      </div>
    </div>

    <div style="height:16px"></div>
    <div class="divider mx"></div>

    <div style="margin-top:24px">
      <div class="rel-title">Também pode gostar</div>
      <div class="rel-row"><div class="rel-inner" id="related-inner"></div></div>
    </div>
    <div style="height:24px"></div>

    ${p.stock > 0 ? `
    <div class="buy-bar">
      <div class="buy-inner">
        <div class="qty-pill">
          <button class="qb" onclick="adjQ(-1)">−</button>
          <span class="qv" id="q-v">1</span>
          <button class="qb" onclick="adjQ(1)">+</button>
        </div>
        <button class="btn-buy" id="buy-btn" onclick="addToCart()">Adicionar — ${kz(p.price)}</button>
      </div>
    </div>` : `
    <div class="buy-bar">
      <div class="esgotado-bar"><i class="fa-solid fa-triangle-exclamation" style="margin-right:6px"></i>Produto esgotado — em breve de volta!</div>
    </div>`}
  `;

  // Related products
  const related = DEMO_PRODS.filter(x => x.cid === p.cid && x.id !== p.id).slice(0,6);
  document.getElementById('related-inner').innerHTML = related.map(r => `
    <div class="rel-card" onclick="location.href='produto.html?id=${r.id}'">
      <div class="rel-img">
        ${r.image?`<img src="${r.image}" alt="${r.name}" loading="lazy" onerror="this.style.display='none'">`:''}
        <span ${r.image?'style="display:none"':''}>${r.emoji}</span>
      </div>
      <div class="rel-body">
        <div class="rel-name">${r.name}</div>
        <div class="rel-price">${kz(r.price)}</div>
      </div>
    </div>`).join('');
}

function setTab(btn, id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(id).classList.add('on');
}

function adjQ(d) {
  _qty = Math.max(1, Math.min(99, _qty + d));
  document.getElementById('q-v').textContent = _qty;
  if (_p) document.getElementById('buy-btn').textContent = `Adicionar — ${kz(_p.price * _qty)}`;
}

function addToCart() {
  if (!_p || _p.stock === 0) return;
  Cart.add({ id:_p.id, name:_p.name, price:_p.price, image:_p.image||'', emoji:_p.emoji }, _qty);
  toast(`✓ ${_p.name} adicionado ao carrinho`, 'ok');
}

function shareProduct() {
  if (navigator.share && _p) {
    navigator.share({ title: _p.name, text: `${_p.name} — ${kz(_p.price)}`, url: location.href });
  } else {
    navigator.clipboard?.writeText(location.href).then(() => toast('Link copiado!', 'info'));
  }
}
</script>
</body>
</html>
